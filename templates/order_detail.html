{% extends 'base.html' %}
{% block title %}Заказ #{{ order.id }}{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header">📋 Заказ #{{ order.id }}</div>
    <div class="card-body">
        <p><strong>Объект:</strong> {{ order.name }}</p>
        <p><strong>Адрес:</strong> {{ order.address }}</p>
        <p><strong>Клиент:</strong> {{ order.client }}</p>
        <p><strong>Статус:</strong> <span class="badge bg-info">{{ order.status }}</span></p>
        <p><strong>Плановая дата:</strong> {{ order.plan_date }}</p>
        
        <form method="post" action="{{ url_for('order_update_status', order_id=order.id) }}" class="mt-3">
            <label class="form-label">Сменить статус:</label>
            <select name="status" class="form-select w-auto d-inline-block">
                {% for s in statuses %}
                    <option value="{{ s }}" {% if s == order.status %}selected{% endif %}>{{ s }}</option>
                {% endfor %}
            </select>
            <button type="submit" class="btn btn-primary btn-sm">Применить</button>
        </form>
        <a href="{{ url_for('orders_list') }}" class="btn btn-secondary btn-sm mt-2">← Назад</a>
    </div>
</div>
{% endblock %}
