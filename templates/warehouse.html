{% extends 'base.html' %}
{% block title %}Склад{% endblock %}
{% block content %}
<h2 class="mb-3"> Склад материалов</h2>
<div class="row">
    <div class="col-md-4">
        <div class="card">
            <div class="card-header"> Добавить материал</div>
            <div class="card-body">
                <form method="post">
                    <div class="mb-2">
                        <input type="text" name="name" class="form-control" placeholder="Название" required>
                    </div>
                    <div class="mb-2">
                        <input type="text" name="unit" class="form-control" placeholder="Ед. (шт, м³)" required>
                    </div>
                    <div class="mb-2">
                        <input type="number" name="quantity" class="form-control" placeholder="Количество" min="1" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Добавить</button>
                </form>
            </div>
        </div>
    </div>
    <div class="col-md-8">
        <table class="table">
            <thead><tr><th>Название</th><th>Ед.</th><th>Остаток</th><th>Зарезерв.</th></tr></thead>
            <tbody>
                {% for m in materials %}
                <tr>
                    <td>{{ m.name }}</td>
                    <td>{{ m.unit }}</td>
                    <td><strong>{{ m.quantity }}</strong></td>
                    <td>{{ m.reserved }}</td>
                </tr>
                {% else %}
                <tr><td colspan="4" class="text-center">Материалов нет</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
