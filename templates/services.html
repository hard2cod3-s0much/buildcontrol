{% extends 'base.html' %}
{% block title %}Услуги{% endblock %}
{% block content %}
<h2 class="mb-3">🛠️ Дополнительные услуги</h2>
<div class="card">
    <div class="card-body">
        <table class="table">
            <thead><tr><th>Название</th><th>Цена</th></tr></thead>
            <tbody>
                {% for s in available %}
                <tr>
                    <td>{{ s.name }}</td>
                    <td>{{ s.price }} ₽</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
